<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lego set</title>
        <style>
            body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
            table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
            th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #ddd; }
            th { font-weight: 600; }
            #error { color: red; }
        </style>
    </head>
    <body>
        <h1>Lego set</h1>
        <div id="error"></div>
        <p><strong>Set id:</strong> <span id="setId"></span></p>
        <p><strong>Set name:</strong> <span id="setName"></span></p>
        <table>
            <thead><tr><th>Image</th><th>Brick type</th><th>Color</th><th>Count</th></tr></thead>
            <tbody id="inventory"></tbody>
        </table>
        <script>
            const urlParameters = new URLSearchParams(document.location.search);
            const setId = urlParameters.get("id");
            fetch(`/api/set?id=${setId}`)
                .then(function(setData) { return setData.json(); })
                .then(function(setJson) {
                    const setId = document.getElementById("setId");
                    setId.innerText = setJson["set_id"];

                    const setName = document.getElementById("setName");
                    setName.innerText = setJson["set_name"];

                    const inventoryTable = document.getElementById("inventory");

                    const bricks = setJson["bricks_data"];

                    for (let i = 0; i < bricks.length; i++) {
                        const inventoryRow = document.createElement("tr");
                        const imgUrl = bricks[i]["img_url"];
                        const name = bricks[i]["name"];
                        const colorId = bricks[i]["color"];
                        const count = bricks[i]["count"];

                        inventoryRow.innerHTML += (
                            `<td><img src=${imgUrl}></td>` +
                            `<td>${name}</td>` +
                            `<td>${colorId}</td>` +
                            `<td>${count}</td>`
                        );
                        inventoryTable.appendChild(inventoryRow);
                    }
                })
                .catch(function(err) {
                    document.getElementById("error").textContent = "Failed to load data: " + err;
                });
        </script>
    </body>
</html>
